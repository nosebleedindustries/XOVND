<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CLVSTER — Algorithmic Sequencer · XOVND</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="auth.css">
<style>
  /* product page specific */
  .product-hero {
    display: grid; grid-template-columns: 1.7fr 1fr;
    border-bottom: 1px solid #2a2722;
    min-height: 86vh;
  }
  .product-hero .ph-left {
    padding: 48px 40px; display: flex; flex-direction: column;
    border-right: 1px solid #2a2722;
    background:
      radial-gradient(circle at 30% 40%, rgba(232,214,14,0.05), transparent 60%),
      var(--black);
    align-items: center; justify-content: center; gap: 32px;
    position: relative;
  }
  .ph-card {
    width: min(100%, 860px); padding: 18px;
    background: var(--charcoal); border: 1px solid #2a2722;
    display: flex; flex-direction: column; gap: 12px;
    transition: transform .35s cubic-bezier(.6,0,.2,1);
  }
  .ph-card:hover { transform: translateY(-4px);}
  .ph-card .product-img {
    width: 100%; aspect-ratio: 16/10; background: var(--black);
    overflow: hidden; border: 1px solid #2a2722;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .ph-card .product-img img { width: 100%; height: 100%; object-fit: cover; }
  .ph-card .product-img .corner {
    position: absolute; bottom: 12px; left: 12px;
    background: var(--yellow); color: var(--black);
    font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 4px 8px; letter-spacing: 0.08em;
    z-index: 3;
  }

  /* Carousel */
  .ph-card .carousel-track {
    position: absolute; inset: 0;
    display: flex; transition: transform .45s cubic-bezier(.6,0,.2,1);
    will-change: transform;
  }
  .ph-card .carousel-track > .slide {
    flex: 0 0 100%; width: 100%; height: 100%;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: var(--black);
  }
  .ph-card .carousel-track > .slide img,
  .ph-card .carousel-track > .slide video {
    width: 100%; height: 100%; object-fit: cover; display: block;
    background: var(--black);
  }
  .ph-card .carousel-track > .slide video { object-fit: contain; }
  .ph-card .carousel-track > .slide .idx-tag {
    position: absolute; top: 10px; right: 10px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--white); background: rgba(0,0,0,0.55);
    padding: 3px 7px; letter-spacing: 0.1em;
    z-index: 2;
  }
  .ph-card .car-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: var(--white);
    border: 1px solid rgba(232,214,14,0.3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 4; transition: all .15s;
    font-family: 'Space Mono', monospace; font-size: 16px;
  }
  .ph-card .car-nav:hover { background: var(--yellow); color: var(--black); border-color: var(--yellow);}
  .ph-card .car-nav.prev { left: 10px;}
  .ph-card .car-nav.next { right: 10px;}
  .ph-card .car-dots {
    position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 3;
  }
  .ph-card .car-dots .dot {
    width: 18px; height: 3px; background: rgba(255,255,255,0.3);
    cursor: pointer; transition: background .15s;
  }
  .ph-card .car-dots .dot.active { background: var(--yellow);}

  .ph-card .car-toolbar {
    display: flex; gap: 8px; padding-top: 4px; flex-wrap: wrap;
    align-items: center;
  }
  .ph-card .car-toolbar .upload-btn {
    flex: 1 1 auto; min-width: 0;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--black); color: var(--white);
    border: 1px solid #2a2722;
    padding: 10px 14px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all .15s;
  }
  .ph-card .car-toolbar .upload-btn:hover {
    border-color: var(--yellow); color: var(--yellow);
  }
  .ph-card .car-toolbar .upload-btn.primary {
    background: var(--yellow); color: var(--black); border-color: var(--yellow);
  }
  .ph-card .car-toolbar .upload-btn.primary:hover {
    background: var(--white); border-color: var(--white);
  }
  .ph-card .car-toolbar .count {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: #807a6c; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0 6px;
  }
  .ph-card .car-toolbar input[type="file"] { display: none; }
  .ph-card .car-toolbar .clear {
    background: transparent; border: 1px solid #2a2722;
    color: #807a6c; padding: 10px 12px; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    transition: all .15s;
  }
  .ph-card .car-toolbar .clear:hover { color: var(--pink); border-color: var(--pink);}

  .ph-card .product-img.drag-over {
    outline: 2px dashed var(--yellow); outline-offset: -8px;
  }
  .ph-card .product-img.drag-over::after {
    content: "Drop images to add to carousel";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); color: var(--yellow);
    font-family: 'Space Mono', monospace; font-size: 12px;
    letter-spacing: 0.12em; text-transform: uppercase;
    z-index: 5; pointer-events: none;
  }

  /* Per-slide hover controls (replace / delete) */
  .ph-card .carousel-track > .slide .slide-tools {
    position: absolute; top: 10px; left: 10px;
    display: flex; gap: 6px; z-index: 3;
    opacity: 0; transition: opacity .15s;
  }
  .ph-card .carousel-track > .slide:hover .slide-tools { opacity: 1;}
  .ph-card .carousel-track > .slide .slide-tools button {
    background: rgba(0,0,0,0.7); color: var(--white);
    border: 1px solid rgba(232,214,14,0.3);
    padding: 5px 9px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .ph-card .carousel-track > .slide .slide-tools button:hover {
    background: var(--yellow); color: var(--black); border-color: var(--yellow);
  }
  .ph-card .carousel-track > .slide .slide-tools button.danger:hover {
    background: var(--pink); border-color: var(--pink);
  }

  /* Generic uploadable media slot used in feature blocks / video grid */
  .media-slot {
    position: relative;
    cursor: default;
  }
  .media-slot.empty { cursor: pointer; }
  .media-slot.drag-over {
    outline: 2px dashed var(--yellow); outline-offset: -8px;
  }
  .media-slot.drag-over::after {
    content: "Drop media here";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); color: var(--yellow);
    font-family: 'Space Mono', monospace; font-size: 12px;
    letter-spacing: 0.12em; text-transform: uppercase;
    z-index: 6; pointer-events: none;
  }
  .media-slot .ms-content {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .media-slot .ms-content img,
  .media-slot .ms-content video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .media-slot .ms-content video { object-fit: contain; background: var(--black);}
  .media-slot .ms-tools {
    position: absolute; top: 12px; right: 12px;
    display: flex; gap: 6px; z-index: 4;
    opacity: 0; transition: opacity .15s;
  }
  .media-slot:hover .ms-tools { opacity: 1; }
  .media-slot .ms-tools button {
    background: rgba(0,0,0,0.7); color: var(--white);
    border: 1px solid rgba(232,214,14,0.3);
    padding: 6px 10px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .media-slot .ms-tools button:hover {
    background: var(--yellow); color: var(--black); border-color: var(--yellow);
  }
  .media-slot .ms-tools button.danger:hover {
    background: var(--pink); border-color: var(--pink);
  }
  .media-slot .ms-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; z-index: 2; color: #807a6c;
  }
  .media-slot .ms-empty .ms-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(232,214,14,0.08); color: var(--yellow);
    display: flex; align-items: center; justify-content: center;
    border: 1px dashed rgba(232,214,14,0.4);
  }
  .media-slot .ms-empty .ms-label {
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .media-slot input[type="file"] { display: none; }
  .ph-card .name-line {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-top: 8px;
  }
  .ph-card .name-line h2 { font-family: 'Archivo Black'; font-size: 28px; margin: 0; letter-spacing: 0.02em;}
  .ph-card .name-line .off {
    background: var(--pink); color: var(--black);
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    padding: 4px 8px; letter-spacing: 0.06em;
  }
  .ph-card .sub { font-family: 'Space Mono', monospace; font-size: 12px; color: #807a6c; letter-spacing: 0.12em; text-transform: uppercase;}

  .product-hero .ph-right {
    padding: 48px 40px; display: flex; flex-direction: column; justify-content: center;
  }
  .ph-eyebrow {
    font-family: 'Space Mono', monospace; font-size: 9px;
    color: var(--pink); text-transform: uppercase; letter-spacing: 0.14em;
    margin-bottom: 14px;
  }
  .ph-logo {
    width: min(70%, 280px); height: auto; display: block;
    mix-blend-mode: screen;
    margin: 0 0 28px -2px;
    animation: clvsterGlitch 4.6s steps(1, end) infinite;
    will-change: filter, transform, opacity;
  }
  @keyframes clvsterGlitch {
    0%, 14%    { filter: saturate(0) brightness(2.6) contrast(1.4); transform: none; opacity: 1; }
    15%        { filter: saturate(0) brightness(2.6) contrast(1.4); transform: translate(-2px, 1px) skewX(-2deg); }
    16%        { transform: translate(2px, -1px) skewX(2deg); }
    17%        { transform: translate(-1px, 0); }
    18%, 36%   { transform: none; filter: saturate(0) brightness(2.8) contrast(1.5); }
    37%        { opacity: 0.18; filter: saturate(0) brightness(0.6); }
    38%        { opacity: 1; filter: saturate(0) brightness(3); }
    39%, 58%   { filter: saturate(0) brightness(2.6) contrast(1.4); }
    59%        { transform: translate(3px, 0) skewX(-4deg); filter: saturate(0) brightness(2.8) contrast(1.6); clip-path: inset(40% 0 30% 0); }
    60%        { transform: translate(-3px, 0) skewX(3deg); clip-path: inset(10% 0 60% 0); }
    61%        { transform: none; clip-path: none; }
    62%, 78%   { filter: saturate(0) brightness(2.4) contrast(1.4); }
    79%        { opacity: 0; }
    80%        { opacity: 1; filter: saturate(0) brightness(3.2); }
    81%        { opacity: 0.4; }
    82%, 94%   { opacity: 1; filter: saturate(0) brightness(2.6); }
    95%        { transform: translate(2px, -1px); filter: saturate(0) brightness(2.8); }
    96%        { transform: translate(-2px, 1px); }
    97%, 100%  { transform: none; filter: saturate(0) brightness(2.6) contrast(1.4); }
  }
  .ph-right h1 {
    font-family: 'Archivo Black'; font-size: clamp(24px, 3.2vw, 46px);
    line-height: 0.85; letter-spacing: -0.02em; margin: 0 0 22px;
    text-wrap: balance;
  }
  .ph-right h1 .alt { color: var(--yellow); }
  .ph-right ul.bullets { list-style: none; padding: 0; margin: 0 0 24px; display: flex; flex-direction: column; gap: 10px;}
  .ph-right ul.bullets li {
    display: grid; grid-template-columns: 18px 1fr; gap: 10px;
    align-items: baseline; font-size: 11px; line-height: 1.45; color: #d7d3c5;
  }
  .ph-right ul.bullets li::before {
    content: "✱"; color: var(--yellow); font-family: 'Space Mono', monospace; font-size: 11px;
    line-height: 1;
  }
  .ph-right ul.bullets li a { color: var(--yellow); border-bottom: 1px dotted; }
  .ph-cta { display: flex; gap: 12px; flex-wrap: wrap; }
  .price-cta {
    display: inline-flex; flex-direction: column;
    background: var(--yellow); color: var(--black);
    padding: 14px 22px; border-radius: 999px; border: none;
    transition: all .18s ease; cursor: pointer;
    text-align: left;
  }
  .price-cta:hover { background: var(--white);}
  .price-cta .lbl { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.65;}
  .price-cta .amt { font-family: 'Archivo Black'; font-size: 16px; letter-spacing: 0.02em; display: flex; align-items: baseline; gap: 8px;}
  .price-cta .amt s { font-family: 'Space Mono'; font-size: 12px; font-weight: 400; opacity: 0.55;}
  .price-cta.alt { background: transparent; color: var(--white); border: 1px solid #3a3630;}
  .price-cta.alt:hover { border-color: var(--white);}

  /* feature blocks */
  .feature {
    display: grid; grid-template-columns: 1fr 1fr; gap: 56px;
    align-items: center; padding: 96px 56px;
    border-bottom: 1px solid #2a2722;
  }
  .feature.reverse .copy { order: 2; }
  .feature .copy h2 {
    font-family: 'Archivo Black'; font-size: clamp(32px, 4vw, 56px);
    line-height: 0.96; letter-spacing: -0.02em; margin: 0 0 22px;
  }
  .feature .copy h2 .alt { color: var(--yellow); }
  .feature .copy p {
    font-size: 17px; line-height: 1.55; color: #b5b0a2; max-width: 480px;
    margin: 0 0 16px; text-wrap: pretty;
  }
  .feature .media {
    position: relative; aspect-ratio: 16/10;
    background: var(--charcoal); border: 1px solid #2a2722; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .media-bg {
    position: absolute; inset: 0; opacity: 0.4;
    background-image:
      repeating-linear-gradient( 0deg, transparent 0 22px, rgba(232,214,14,0.1) 22px 23px),
      repeating-linear-gradient(90deg, transparent 0 22px, rgba(232,214,14,0.1) 22px 23px);
  }
  .play-overlay {
    width: 84px; height: 84px; border-radius: 50%;
    background: var(--yellow); color: var(--black);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 8px rgba(232,214,14,0.15), 0 0 0 24px rgba(232,214,14,0.06);
    cursor: pointer; transition: transform .2s;
    border: none; z-index: 2;
  }
  .play-overlay:hover { transform: scale(1.06);}
  .feature .media .corner-label {
    position: absolute; top: 16px; left: 16px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--yellow); letter-spacing: 0.12em; text-transform: uppercase;
    z-index: 2;
  }
  .feature .media .corner-label.tr { left: auto; right: 16px; color: #807a6c;}
  .feature .media .runtime {
    position: absolute; bottom: 16px; right: 16px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    background: rgba(0,0,0,0.7); padding: 4px 8px; color: var(--white);
    letter-spacing: 0.06em;
  }
  .feature.full-bleed-media {
    grid-template-columns: 1fr; padding: 0;
    border-bottom: 1px solid #2a2722;
  }
  .feature.full-bleed-media .media { aspect-ratio: 21/9; border: none; }

  /* audio demos */
  .audio-demos {
    padding: 88px 56px; border-bottom: 1px solid #2a2722;
    background: var(--charcoal);
  }
  .demo-list { display: flex; flex-direction: column; gap: 1px; background: #2a2722; border: 1px solid #2a2722;}
  .demo-row {
    display: grid; grid-template-columns: 60px 1fr 200px 80px;
    align-items: center; gap: 20px; padding: 18px 22px;
    background: var(--black); transition: background .15s;
    cursor: pointer;
  }
  .demo-row:hover { background: #15130f;}
  .demo-row.playing { background: linear-gradient(90deg, rgba(232,214,14,0.08), transparent);}
  .demo-row .play-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--white); color: var(--black);
    display: inline-flex; align-items: center; justify-content: center;
    border: none; cursor: pointer; transition: all .15s;
  }
  .demo-row .play-btn:hover, .demo-row.playing .play-btn {
    background: var(--yellow);
  }
  .demo-row .title { font-weight: 600; font-size: 15px;}
  .demo-row .author { font-family: 'Space Mono', monospace; font-size: 11px; color: #807a6c; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px;}
  .demo-row .waveform {
    display: flex; gap: 2px; align-items: center; height: 28px;
  }
  .demo-row .waveform .bar {
    flex: 1; background: #3a3630; border-radius: 1px;
    transition: background .15s;
  }
  .demo-row.playing .waveform .bar { background: var(--yellow);}
  .demo-row.playing .waveform .bar.active { background: var(--pink); animation: vu 0.6s ease-in-out infinite alternate;}
  @keyframes vu { from { transform: scaleY(0.6); transform-origin: center;} to { transform: scaleY(1.1);}}
  .demo-row .runtime { font-family: 'Space Mono', monospace; font-size: 12px; color: #807a6c; text-align: right;}

  /* testimonials grid (mason) */
  .testimonials-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    padding: 88px 56px; border-bottom: 1px solid #2a2722;
  }
  .testimonials-grid .tcard {
    background: var(--charcoal); border: 1px solid #2a2722;
    padding: 26px; display: flex; flex-direction: column; gap: 18px;
  }
  .testimonials-grid .tcard.featured { background: var(--yellow); color: var(--black);}
  .testimonials-grid .tcard.featured .who .role { color: rgba(0,0,0,0.6);}
  .testimonials-grid .tcard.featured .avatar { background: var(--black); color: var(--yellow);}
  .tcard .avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--pink); display: flex; align-items: center; justify-content: center;
    font-family: 'Archivo Black'; color: var(--black); font-size: 20px;
  }
  .tcard blockquote {
    margin: 0; font-size: 16px; line-height: 1.45; flex: 1; text-wrap: pretty;
  }
  .tcard .who .name { font-weight: 700; font-size: 14px;}
  .tcard .who .role { font-family: 'Space Mono', monospace; font-size: 11px; color: #807a6c; letter-spacing: 0.05em; margin-top: 2px;}

  /* explore the features (mini grid) */
  .explore {
    padding: 88px 56px; border-bottom: 1px solid #2a2722;
  }
  .explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #2a2722; border: 1px solid #2a2722;}
  .explore-card { background: var(--black); padding: 24px; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between; gap: 16px; transition: background .15s; cursor: pointer;}
  .explore-card:hover { background: #15130f;}
  .explore-card h3 { font-family: 'Archivo Black'; font-size: 22px; margin: 0; letter-spacing: -0.01em;}
  .explore-card p { margin: 0; font-size: 13px; color: #807a6c; line-height: 1.4;}
  .explore-card .num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--yellow); letter-spacing: 0.12em;}

  /* video grid */
  .videos { padding: 88px 56px; border-bottom: 1px solid #2a2722;}
  .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;}
  .video-card {
    aspect-ratio: 16/9; position: relative;
    background: var(--charcoal); border: 1px solid #2a2722;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden;
  }
  .video-card .play-mini {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--yellow); color: var(--black);
    display: flex; align-items: center; justify-content: center;
    z-index: 2; transition: transform .2s;
  }
  .video-card:hover .play-mini { transform: scale(1.1);}
  .video-card .vlabel {
    position: absolute; bottom: 14px; left: 14px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--white); letter-spacing: 0.06em;
    background: rgba(0,0,0,0.6); padding: 4px 8px;
  }
  .video-card .vbg {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient( 0deg, transparent 0 18px, rgba(232,214,14,0.06) 18px 19px),
      repeating-linear-gradient(90deg, transparent 0 18px, rgba(232,214,14,0.06) 18px 19px);
  }

  /* accordion */
  .details {
    padding: 88px 56px; border-bottom: 1px solid #2a2722;
    display: grid; grid-template-columns: 1fr 1fr; gap: 56px;
  }
  .acc { display: flex; flex-direction: column; gap: 1px; background: #2a2722; border: 1px solid #2a2722;}
  .acc-item {
    background: var(--black);
  }
  .acc-head {
    width: 100%; text-align: left; padding: 22px 24px;
    background: transparent; border: none; color: var(--white);
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Archivo Black'; font-size: 18px; letter-spacing: -0.01em;
    cursor: pointer;
  }
  .acc-head:hover { color: var(--yellow);}
  .acc-head .chev { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--yellow); transition: transform .2s;}
  .acc-item.open .acc-head .chev { transform: rotate(45deg);}
  .acc-body {
    max-height: 0; overflow: hidden; transition: max-height .35s ease;
  }
  .acc-item.open .acc-body { max-height: 800px;}
  .acc-body-inner {
    padding: 0 24px 24px; color: #b5b0a2; line-height: 1.55; font-size: 14px;
  }
  .acc-body-inner ul { padding-left: 16px;}
  .acc-body-inner li { margin-bottom: 8px;}
  .acc-body-inner a { color: var(--yellow); border-bottom: 1px dotted; }

  /* pricing */
  .pricing {
    padding: 88px 56px; border-bottom: 1px solid #2a2722;
    background: var(--black);
  }
  .pricing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1100px; margin: 0 auto;}
  .price-card {
    background: var(--charcoal); border: 1px solid #2a2722;
    padding: 36px; display: flex; flex-direction: column; gap: 22px;
    position: relative;
  }
  .price-card.featured { background: var(--yellow); color: var(--black); border-color: var(--yellow);}
  .price-card .ptag {
    position: absolute; top: -12px; right: 24px;
    background: var(--pink); color: var(--black);
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    padding: 4px 10px; letter-spacing: 0.08em;
  }
  .price-card h3 {
    font-family: 'Archivo Black'; font-size: 28px; margin: 0; letter-spacing: -0.01em;
  }
  .price-card .price-amt {
    font-family: 'Archivo Black'; font-size: 56px; line-height: 1; letter-spacing: -0.02em;
  }
  .price-card .price-amt s { font-family: 'Space Mono'; font-weight: 400; font-size: 22px; opacity: 0.5; margin-right: 12px;}
  .price-card .price-amt .per { font-family: 'Space Mono'; font-size: 14px; font-weight: 400; opacity: 0.65;}
  .price-card ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; flex: 1;}
  .price-card li { padding-left: 22px; position: relative; font-size: 15px; line-height: 1.4;}
  .price-card li::before {
    content: "✱"; position: absolute; left: 0; color: var(--yellow); font-family: 'Space Mono';
  }
  .price-card.featured li::before { color: var(--black);}
  .price-card .pbtn {
    background: var(--white); color: var(--black); border: none;
    padding: 16px; font-family: 'Archivo Black'; font-size: 14px;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
  }
  .price-card.featured .pbtn { background: var(--black); color: var(--yellow);}
  .price-card .pbtn:hover { background: var(--pink);}

  @media (max-width: 900px) {
    .product-hero { grid-template-columns: 1fr;}
    .product-hero .ph-left { border-right: 0; border-bottom: 1px solid #2a2722; padding: 40px 24px;}
    .product-hero .ph-right { padding: 40px 24px;}
    .feature { grid-template-columns: 1fr; padding: 56px 24px; gap: 32px;}
    .feature.reverse .copy { order: 0;}
    .audio-demos, .testimonials-grid, .explore, .videos, .details, .pricing { padding: 56px 24px;}
    .testimonials-grid, .video-grid, .explore-grid, .pricing-grid { grid-template-columns: 1fr;}
    .details { grid-template-columns: 1fr;}
    .demo-row { grid-template-columns: 50px 1fr 70px; gap: 12px;}
    .demo-row .waveform { display: none;}
  }

  .related-strip {
    display: flex; gap: 16px; padding: 32px 56px;
    overflow-x: auto; border-bottom: 1px solid #2a2722;
    align-items: center;
  }
  .related-strip .lbl {
    font-family: 'Space Mono', monospace; font-size: 11px; color: #807a6c;
    letter-spacing: 0.14em; text-transform: uppercase; flex: none;
  }
  .related-strip a {
    flex: none; padding: 10px 16px; border: 1px solid #2a2722; border-radius: 999px;
    font-size: 13px; color: #d7d3c5; transition: all .15s;
  }
  .related-strip a:hover, .related-strip a.current { border-color: var(--yellow); color: var(--yellow);}

</style>
