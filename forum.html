<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>XOVND Forum</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="auth.css">
<style>
  .forum-shell { min-height: calc(100vh - 80px); padding: 48px 40px 80px; max-width: 1100px; margin: 0 auto; }
  .forum-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 36px; flex-wrap: wrap; gap: 20px;
    border-bottom: 1px solid #2a2722; padding-bottom: 28px;
  }
  .forum-head h1 {
    font-family: 'Archivo Black'; font-size: clamp(40px, 5vw, 72px);
    line-height: 0.95; letter-spacing: -0.02em; margin: 0;
  }
  .forum-head h1 .alt { color: var(--yellow);}
  .forum-head .eyebrow {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--pink); letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .forum-head p { color: #b5b0a2; max-width: 380px; margin: 0; font-size: 14px; line-height: 1.5;}

  /* gated overlay */
  .gated {
    border: 1px dashed #3a3630; padding: 64px 32px; text-align: center;
    background: var(--charcoal);
  }
  .gated .lock-icon {
    width: 56px; height: 56px; border-radius: 50%; background: var(--yellow); color: var(--black);
    display: inline-flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .gated h2 { font-family: 'Archivo Black'; font-size: 24px; margin: 0 0 8px;}
  .gated p { color: #b5b0a2; max-width: 380px; margin: 0 auto 24px; font-size: 14px; line-height: 1.5;}

  /* thread list */
  .new-thread-bar {
    display: flex; gap: 12px; align-items: center; margin-bottom: 24px;
  }
  .new-thread-bar input {
    flex: 1; background: var(--charcoal); border: 1px solid #2a2722; color: var(--white);
    padding: 14px 18px; font-family: inherit; font-size: 15px; border-radius: 4px;
    transition: border-color .15s;
  }
  .new-thread-bar input:focus { outline: none; border-color: var(--yellow);}
  .new-thread-bar input::placeholder { color: #4a463d;}
  .post-btn {
    padding: 13px 22px; background: var(--yellow); color: var(--black); border: none;
    font-family: 'Archivo Black'; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
    border-radius: 999px; cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .post-btn:hover:not(:disabled) { background: var(--white);}
  .post-btn:disabled { opacity: 0.4; cursor: not-allowed;}

  .thread-list { display: flex; flex-direction: column; gap: 1px; background: #2a2722; border: 1px solid #2a2722;}
  .thread-row {
    display: grid; grid-template-columns: 40px 1fr auto auto; gap: 16px;
    padding: 18px 22px; background: var(--black);
    align-items: center; cursor: pointer; transition: background .15s;
  }
  .thread-row:hover { background: #15130f;}
  .thread-row .avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--pink);
    color: var(--black); display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Archivo Black'; font-size: 13px; flex: none;
  }
  .thread-row .info .title {
    font-family: 'Archivo Black'; font-size: 17px; letter-spacing: -0.005em;
    line-height: 1.2; margin: 0 0 4px;
  }
  .thread-row .info .meta {
    font-family: 'Space Mono', monospace; font-size: 11px; color: #807a6c;
    letter-spacing: 0.06em;
  }
  .thread-row .info .meta .author { color: #c9c5b8;}
  .thread-row .info .meta .tag {
    background: rgba(232,214,14,0.16); color: var(--yellow);
    padding: 2px 6px; border-radius: 2px; margin-left: 6px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .thread-row .count {
    font-family: 'Space Mono', monospace; font-size: 12px; color: #807a6c;
    text-align: center; min-width: 60px;
  }
  .thread-row .count b { color: var(--yellow); display: block; font-size: 18px; font-weight: 700; line-height: 1;}
  .thread-row .arrow { color: #4a463d; font-family: 'Space Mono';}
  .thread-row:hover .arrow { color: var(--yellow);}

  .thread-empty {
    background: var(--black); padding: 48px; text-align: center; color: #807a6c;
  }
  .thread-empty b { display: block; font-family: 'Archivo Black'; color: var(--white); font-size: 18px; margin-bottom: 8px;}

  /* thread view */
  .back-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Space Mono', monospace; font-size: 11px; color: #807a6c;
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 24px;
    cursor: pointer; background: transparent; border: none; padding: 0;
  }
  .back-link:hover { color: var(--yellow);}
  .thread-title {
    font-family: 'Archivo Black'; font-size: clamp(28px, 3.4vw, 44px);
    line-height: 1; letter-spacing: -0.02em; margin: 0 0 8px;
  }
  .thread-meta {
    font-family: 'Space Mono', monospace; font-size: 12px; color: #807a6c;
    letter-spacing: 0.08em; margin-bottom: 32px;
  }
  .thread-meta .author { color: var(--yellow);}

  .post-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px;}
  .post-card {
    display: grid; grid-template-columns: 44px 1fr; gap: 16px;
    background: var(--charcoal); border: 1px solid #2a2722; padding: 18px 20px;
  }
  .post-card.op { border-left: 3px solid var(--yellow);}
  .post-card.self { border-left: 3px solid var(--pink);}
  .post-card .avatar {
    width: 44px; height: 44px; border-radius: 50%; background: var(--pink);
    color: var(--black); display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Archivo Black'; font-size: 14px; flex: none;
  }
  .post-card.op .avatar { background: var(--yellow);}
  .post-card .top {
    display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .post-card .top .who { font-weight: 700; font-size: 14px;}
  .post-card .top .ts {
    font-family: 'Space Mono', monospace; font-size: 11px; color: #807a6c;
    letter-spacing: 0.06em;
  }
  .post-card .body { font-size: 15px; line-height: 1.55; color: #d7d3c5; white-space: pre-wrap; text-wrap: pretty;}
  .post-card .actions {
    display: flex; gap: 12px; margin-top: 10px;
    font-family: 'Space Mono', monospace; font-size: 11px; color: #807a6c;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .post-card .actions button {
    background: transparent; border: none; color: inherit; padding: 0; cursor: pointer;
  }
  .post-card .actions button:hover { color: var(--yellow);}
  .post-card .actions .liked { color: var(--yellow);}

  .reply-form {
    display: flex; flex-direction: column; gap: 12px;
    background: var(--charcoal); border: 1px solid #2a2722; padding: 18px;
  }
  .reply-form textarea {
    background: var(--black); border: 1px solid #3a3630; color: var(--white);
    padding: 12px 14px; font-family: inherit; font-size: 14px; line-height: 1.5;
    min-height: 110px; resize: vertical; border-radius: 3px;
    transition: border-color .15s;
  }
  .reply-form textarea:focus { outline: none; border-color: var(--yellow);}
  .reply-form textarea::placeholder { color: #4a463d;}
  .reply-form .footer-row { display: flex; justify-content: space-between; align-items: center;}
  .reply-form .footer-row .as {
    font-family: 'Space Mono', monospace; font-size: 11px; color: #807a6c;
    letter-spacing: 0.06em;
  }
  .reply-form .footer-row .as b { color: var(--yellow);}

  .forum-body {
    display: grid; grid-template-columns: 260px 1fr; gap: 28px;
    align-items: start;
  }
  .forum-main { min-width: 0; }

  /* sidebar */
  .cat-sidebar {
    position: sticky; top: 80px;
    display: flex; flex-direction: column; gap: 4px;
    background: var(--charcoal); border: 1px solid #2a2722; padding: 12px;
  }
  .cat-label {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--pink);
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 8px 10px 12px;
  }
  .cat-item {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    background: transparent; border: none; color: #c9c5b8;
    padding: 10px 12px; cursor: pointer;
    font-family: inherit; font-size: 13px; text-align: left;
    border-left: 2px solid transparent;
    transition: all .15s; border-radius: 2px;
  }
  .cat-item:hover { background: #15130f; color: var(--white);}
  .cat-item.on { background: #15130f; color: var(--yellow); border-left-color: var(--yellow);}
  .cat-item.cat-pink.on { color: var(--pink); border-left-color: var(--pink);}
  .cat-count {
    font-family: 'Space Mono', monospace; font-size: 11px; color: #6a6557;
    background: rgba(0,0,0,0.4); padding: 1px 8px; border-radius: 10px;
    flex: none;
  }
  .cat-item.on .cat-count { color: var(--yellow); background: rgba(232,214,14,0.15);}
  .cat-item.cat-pink.on .cat-count { color: var(--pink); background: rgba(212,168,174,0.18);}

  /* category chip on thread rows */
  .cat-chip {
    font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 2px; margin-right: 8px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .cat-chip-yellow { background: rgba(232,214,14,0.16); color: var(--yellow);}
  .cat-chip-pink   { background: rgba(212,168,174,0.16); color: var(--pink);}

  /* category select in composer */
  .cat-select {
    background: var(--charcoal); border: 1px solid #2a2722; color: var(--white);
    padding: 14px 16px; font-family: inherit; font-size: 14px; border-radius: 4px;
    transition: border-color .15s; min-width: 180px; flex: none;
  }
  .cat-select:focus { outline: none; border-color: var(--yellow);}

  /* category chip on thread rows */
  .cat-chip {
    font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 2px; margin-right: 8px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .cat-chip-yellow { background: rgba(232,214,14,0.16); color: var(--yellow);}
  .cat-chip-pink   { background: rgba(212,168,174,0.16); color: var(--pink);}

  @media (max-width: 700px) {
    .forum-shell { padding: 32px 16px 56px;}
    .new-thread-bar { flex-direction: column; align-items: stretch;}
    .thread-row { grid-template-columns: 36px 1fr auto; }
    .thread-row .arrow { display: none;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="forum.jsx"></script>
</body>
</html>
