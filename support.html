<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>XOVND — Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="auth.css">
<style>
  .sup-shell { padding: 56px 40px 96px; max-width: 1200px; margin: 0 auto; }
  .sup-head {
    margin-bottom: 40px; padding-bottom: 28px;
    border-bottom: 1px solid #2a2722;
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 24px; flex-wrap: wrap;
  }
  .sup-head .eyebrow {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--pink); letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .sup-head h1 {
    font-family: 'Archivo Black'; font-size: clamp(40px, 5vw, 72px);
    line-height: 0.92; letter-spacing: -0.02em; margin: 0;
  }
  .sup-head h1 .alt { color: var(--yellow);}
  .sup-head .lead {
    max-width: 360px; color: #b5b0a2; font-size: 15px; line-height: 1.5; margin: 0;
  }

  .sup-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
    align-items: start;
  }

  /* shared card */
  .sup-card {
    background: var(--charcoal); border: 1px solid #2a2722;
    padding: 26px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .sup-card h2 {
    font-family: 'Archivo Black'; font-size: 22px; margin: 0;
    letter-spacing: -0.01em;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .sup-card .panel-kicker {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--pink); letter-spacing: 0.18em; text-transform: uppercase;
  }

  /* mail form */
  .mail-form { display: flex; flex-direction: column; gap: 12px; }
  .mail-form .from {
    background: #14110c; padding: 10px 14px; border: 1px dashed #3a3630;
    border-radius: 3px; font-family: 'Space Mono', monospace; font-size: 12px;
    color: #807a6c; display: flex; gap: 10px; flex-wrap: wrap;
  }
  .mail-form .from b { color: var(--yellow); font-weight: 700;}
  .mail-form label { display: flex; flex-direction: column; gap: 6px;}
  .mail-form label > span {
    font-family: 'Space Mono', monospace; font-size: 10px; color: #807a6c;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .mail-form input, .mail-form select, .mail-form textarea {
    background: var(--black); border: 1px solid #3a3630; color: var(--white);
    padding: 11px 13px; font-size: 14px; font-family: inherit;
    border-radius: 3px; transition: border-color .15s;
  }
  .mail-form textarea { min-height: 140px; resize: vertical; line-height: 1.5;}
  .mail-form input:focus, .mail-form select:focus, .mail-form textarea:focus {
    outline: none; border-color: var(--yellow);
  }
  .mail-form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px;}
  .send-btn {
    padding: 13px 20px; background: var(--yellow); color: var(--black);
    border: none; border-radius: 999px; cursor: pointer;
    font-family: 'Archivo Black'; font-size: 13px; letter-spacing: 0.06em;
    text-transform: uppercase;
    display: inline-flex; align-items: center; justify-content: space-between; gap: 10px;
    transition: all .15s;
  }
  .send-btn:hover:not(:disabled) { background: var(--white);}
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed;}

  /* ticket strip */
  .ticket-strip {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    margin-bottom: 4px;
  }
  .ticket-stat {
    background: var(--black); border: 1px solid #2a2722;
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  }
  .ticket-stat .ic {
    width: 36px; height: 36px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    flex: none;
  }
  .ticket-stat.open .ic { background: rgba(232,214,14,0.16); color: var(--yellow);}
  .ticket-stat.closed .ic { background: rgba(124,255,110,0.14); color: #7CFF6E;}
  .ticket-stat.pending .ic { background: rgba(212,168,174,0.18); color: var(--pink);}
  .ticket-stat .lbl { font-family: 'Space Mono', monospace; font-size: 10px; color: #807a6c; letter-spacing: 0.12em; text-transform: uppercase; display: block;}
  .ticket-stat .num { font-family: 'Archivo Black'; font-size: 22px; letter-spacing: -0.01em; display: block; margin-top: 2px;}

  /* ticket list */
  .ticket-list {
    display: flex; flex-direction: column; gap: 1px;
    background: #2a2722; border: 1px solid #2a2722;
  }
  .ticket-row {
    display: grid; grid-template-columns: 28px 1fr auto; gap: 12px;
    padding: 12px 14px; background: var(--black); align-items: center;
  }
  .ticket-row .dot {
    width: 22px; height: 22px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    flex: none;
  }
  .ticket-row.open .dot { background: rgba(232,214,14,0.16); color: var(--yellow);}
  .ticket-row.closed .dot { background: rgba(124,255,110,0.16); color: #7CFF6E;}
  .ticket-row .subj { font-size: 13px; font-weight: 600;}
  .ticket-row .meta {
    font-family: 'Space Mono', monospace; font-size: 10px; color: #807a6c;
    letter-spacing: 0.06em; margin-top: 2px;
  }
  .ticket-row .pill {
    font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 3px 7px; border-radius: 2px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .pill.open { background: rgba(232,214,14,0.16); color: var(--yellow);}
  .pill.closed { background: rgba(124,255,110,0.16); color: #7CFF6E;}
  .ticket-empty {
    background: var(--black); padding: 22px; text-align: center;
    color: #807a6c; font-size: 13px;
  }

  /* chat */
  .chat-card {
    grid-column: 1 / -1;
    background: var(--charcoal); border: 1px solid #2a2722;
    display: flex; flex-direction: column; min-height: 480px;
  }
  .chat-head {
    padding: 18px 22px; border-bottom: 1px solid #2a2722;
    display: flex; justify-content: space-between; align-items: center; gap: 16px;
    flex-wrap: wrap;
  }
  .chat-head .who { display: flex; align-items: center; gap: 12px;}
  .chat-head .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--yellow); color: var(--black);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Archivo Black'; font-size: 14px;
    box-shadow: 0 0 0 4px rgba(232,214,14,0.16);
  }
  .chat-head .name { font-family: 'Archivo Black'; font-size: 16px; }
  .chat-head .name + .status {
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--pink);
    letter-spacing: 0.1em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 6px; margin-top: 2px;
  }
  .chat-head .status::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--pink);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 50% { opacity: 0.3; } }
  .chat-clear {
    background: transparent; border: 1px solid #3a3630; color: #807a6c;
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 6px 10px; border-radius: 999px; cursor: pointer;
    transition: all .15s;
  }
  .chat-clear:hover { color: var(--pink); border-color: var(--pink);}

  .chat-body {
    flex: 1; padding: 22px; overflow-y: auto; min-height: 280px;
    display: flex; flex-direction: column; gap: 14px;
    max-height: 60vh;
  }
  .msg { display: flex; gap: 12px; align-items: flex-start; max-width: 78%;}
  .msg.bot { align-self: flex-start;}
  .msg.user { align-self: flex-end; flex-direction: row-reverse;}
  .msg .bubble {
    padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5;
    white-space: pre-wrap; text-wrap: pretty;
  }
  .msg.bot .bubble { background: var(--black); border: 1px solid #2a2722; color: #d7d3c5; border-top-left-radius: 4px;}
  .msg.user .bubble { background: var(--yellow); color: var(--black); border-top-right-radius: 4px;}
  .msg .avatar-sm {
    width: 30px; height: 30px; border-radius: 50%; flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Archivo Black'; font-size: 11px;
  }
  .msg.bot .avatar-sm { background: var(--yellow); color: var(--black); }
  .msg.user .avatar-sm { background: var(--pink); color: var(--black);}
  .msg .ts {
    font-family: 'Space Mono', monospace; font-size: 10px; color: #6a6557;
    letter-spacing: 0.04em; margin-top: 4px;
  }
  .msg.user .ts { text-align: right; }

  .typing { display: inline-flex; gap: 4px; padding: 4px 8px;}
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--yellow);
    animation: typing 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0);}
    30% { opacity: 1; transform: translateY(-3px);}
  }

  .chat-input {
    border-top: 1px solid #2a2722; padding: 16px 22px;
    display: flex; gap: 10px; align-items: flex-end;
  }
  .chat-input textarea {
    flex: 1; background: var(--black); border: 1px solid #3a3630; color: var(--white);
    padding: 11px 14px; font-family: inherit; font-size: 14px; line-height: 1.4;
    border-radius: 10px; resize: none; min-height: 42px; max-height: 140px;
    transition: border-color .15s;
  }
  .chat-input textarea:focus { outline: none; border-color: var(--yellow);}
  .chat-input textarea::placeholder { color: #4a463d;}
  .chat-send {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--yellow); color: var(--black); border: none;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s; flex: none;
  }
  .chat-send:hover:not(:disabled) { background: var(--white); transform: scale(1.05);}
  .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* satisfaction bar */
  .sat-card {
    grid-column: 1 / -1;
    background: var(--charcoal); border: 1px solid #2a2722; padding: 22px 26px;
    display: flex; justify-content: space-between; align-items: center; gap: 24px;
    flex-wrap: wrap;
  }
  .sat-card .copy h3 {
    font-family: 'Archivo Black'; font-size: 18px; margin: 0 0 4px;
    letter-spacing: -0.005em;
  }
  .sat-card .copy p { margin: 0; color: #807a6c; font-size: 13px; line-height: 1.4;}
  .sat-bar { display: flex; gap: 10px;}
  .sat-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--black); border: 1px solid #2a2722;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s;
    font-size: 28px;
    filter: grayscale(0.6);
  }
  .sat-btn:hover { transform: translateY(-3px); filter: grayscale(0);}
  .sat-btn.on {
    background: var(--yellow); border-color: var(--yellow);
    filter: grayscale(0);
    box-shadow: 0 0 0 6px rgba(232,214,14,0.18);
  }
  .sat-thanks {
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--yellow);
    letter-spacing: 0.14em; text-transform: uppercase;
    opacity: 0; transition: opacity .25s;
  }
  .sat-thanks.show { opacity: 1;}

  /* toast (reused style) */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--yellow); color: var(--black);
    padding: 12px 18px; border-radius: 999px;
    font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    opacity: 0; pointer-events: none; transition: all .3s ease;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0);}

  @media (max-width: 900px) {
    .sup-grid { grid-template-columns: 1fr;}
    .sup-shell { padding: 32px 20px 56px;}
    .mail-form .row { grid-template-columns: 1fr;}
    .ticket-strip { grid-template-columns: 1fr;}
    .sat-card { flex-direction: column; align-items: flex-start;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="support.jsx"></script>
</body>
</html>
