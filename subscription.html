<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>XOVND — Subscription</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="auth.css">
<style>
  .sub-shell { padding: 56px 40px 96px; max-width: 1200px; margin: 0 auto; }
  .sub-head {
    text-align: center; margin-bottom: 56px;
    border-bottom: 1px solid #2a2722; padding-bottom: 48px;
  }
  .sub-head .eyebrow {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--pink); letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .sub-head h1 {
    font-family: 'Archivo Black'; font-size: clamp(48px, 6vw, 92px);
    line-height: 0.9; letter-spacing: -0.02em; margin: 0 0 22px;
    text-wrap: balance;
  }
  .sub-head h1 .alt { color: var(--yellow);}
  .sub-head p {
    max-width: 560px; margin: 0 auto; color: #b5b0a2;
    font-size: 16px; line-height: 1.55; text-wrap: pretty;
  }

  /* the two cards */
  .sub-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 28px;
    max-width: 1040px; margin: 0 auto;
  }
  .sub-card {
    background: var(--charcoal); border: 1px solid #2a2722;
    padding: 40px 36px 36px;
    display: flex; flex-direction: column; gap: 22px;
    position: relative; transition: transform .25s;
  }
  .sub-card:hover { transform: translateY(-4px);}
  .sub-card.featured {
    background: var(--yellow); color: var(--black); border-color: var(--yellow);
  }
  .sub-card .ptag {
    position: absolute; top: -14px; right: 26px;
    background: var(--pink); color: var(--black);
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    padding: 5px 12px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .sub-card .kicker {
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #807a6c;
  }
  .sub-card.featured .kicker { color: rgba(0,0,0,0.55);}
  .sub-card h2 {
    font-family: 'Archivo Black'; font-size: 32px; margin: 0;
    letter-spacing: -0.01em; line-height: 1.05;
  }
  .sub-card .lede {
    font-size: 15px; line-height: 1.5; color: #b5b0a2;
    text-wrap: pretty; margin: 0;
  }
  .sub-card.featured .lede { color: rgba(0,0,0,0.7);}
  .sub-card .price-amt {
    font-family: 'Archivo Black'; font-size: 64px; line-height: 1;
    letter-spacing: -0.02em;
    display: flex; align-items: baseline; gap: 10px;
  }
  .sub-card .price-amt .per {
    font-family: 'Space Mono', monospace; font-size: 14px;
    font-weight: 400; letter-spacing: 0.06em; opacity: 0.65;
  }
  .sub-card .price-amt .pre {
    font-family: 'Space Mono', monospace; font-size: 18px;
    font-weight: 400; opacity: 0.65;
  }
  .sub-card ul {
    list-style: none; padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 14px; flex: 1;
  }
  .sub-card li {
    padding-left: 28px; position: relative; font-size: 15px; line-height: 1.45;
    text-wrap: pretty;
  }
  .sub-card li::before {
    content: ""; position: absolute; left: 0; top: 8px;
    width: 16px; height: 1px; background: var(--yellow);
  }
  .sub-card.featured li::before { background: var(--black);}
  .sub-card li b { font-weight: 700; }
  .sub-card .pbtn {
    background: var(--white); color: var(--black); border: none;
    padding: 18px 22px; font-family: 'Archivo Black'; font-size: 14px;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    transition: all .15s; border-radius: 999px;
  }
  .sub-card.featured .pbtn { background: var(--black); color: var(--yellow); }
  .sub-card .pbtn:hover { background: var(--pink);}
  .sub-card .pbtn .arrow { transition: transform .15s;}
  .sub-card .pbtn:hover .arrow { transform: translateX(4px);}
  .sub-card .micro {
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #807a6c; text-align: center;
  }
  .sub-card.featured .micro { color: rgba(0,0,0,0.55);}

  /* compare strip */
  .sub-compare {
    margin: 72px auto 0; max-width: 920px;
    background: var(--charcoal); border: 1px solid #2a2722; padding: 32px;
    display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 14px 24px;
    align-items: center;
  }
  .sub-compare h3 {
    grid-column: 1 / -1;
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--pink); letter-spacing: 0.18em; text-transform: uppercase;
    margin: 0 0 8px;
  }
  .sub-compare .crow {
    display: contents;
  }
  .sub-compare .crow > * { padding: 12px 0; border-top: 1px solid #2a2722;}
  .sub-compare .crow.head > * { border-top: none; font-family: 'Archivo Black'; font-size: 14px; letter-spacing: 0;}
  .sub-compare .crow.head .basic-h { color: #c9c5b8; }
  .sub-compare .crow.head .pro-h { color: var(--yellow);}
  .sub-compare .feat { color: #d7d3c5; font-size: 14px; }
  .sub-compare .cell { text-align: center; font-size: 13px; color: #807a6c; font-family: 'Space Mono', monospace; letter-spacing: 0.06em;}
  .sub-compare .cell.yes { color: var(--yellow);}
  .sub-compare .cell.no { color: #4a463d;}

  /* faq */
  .sub-faq { max-width: 920px; margin: 56px auto 0; }
  .sub-faq h2 {
    font-family: 'Archivo Black'; font-size: clamp(28px, 3.4vw, 44px);
    margin: 0 0 24px; letter-spacing: -0.02em;
  }
  .sub-faq h2 .alt { color: var(--yellow);}
  .sub-faq .faq-item {
    border-top: 1px solid #2a2722; padding: 20px 0;
    cursor: pointer;
  }
  .sub-faq .faq-item:last-child { border-bottom: 1px solid #2a2722;}
  .sub-faq .faq-q {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Archivo Black'; font-size: 18px; letter-spacing: -0.01em;
    color: var(--white); transition: color .15s;
  }
  .sub-faq .faq-item:hover .faq-q { color: var(--yellow);}
  .sub-faq .faq-q .chev { font-family: 'Space Mono', monospace; color: var(--yellow); transition: transform .25s;}
  .sub-faq .faq-item.open .faq-q .chev { transform: rotate(45deg);}
  .sub-faq .faq-a {
    max-height: 0; overflow: hidden; transition: max-height .35s ease, margin .35s ease;
    color: #b5b0a2; font-size: 14px; line-height: 1.55;
  }
  .sub-faq .faq-item.open .faq-a { max-height: 220px; margin-top: 12px;}

  @media (max-width: 800px) {
    .sub-grid { grid-template-columns: 1fr;}
    .sub-shell { padding: 32px 20px 64px;}
    .sub-compare { grid-template-columns: 1fr;}
    .sub-compare .crow > * { padding: 6px 0;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="subscription.jsx"></script>
</body>
</html>
