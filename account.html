<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>XOVND — Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="auth.css">
<style>
  /* ============ Account page ============ */
  .acc-shell { max-width: 1100px; margin: 0 auto; padding: 64px 32px 120px; }

  .acc-head {
    display: grid; grid-template-columns: 96px 1fr auto;
    gap: 22px; align-items: center;
    border-bottom: 1px solid #2a2722; padding-bottom: 30px; margin-bottom: 36px;
  }
  .acc-avatar {
    width: 96px; height: 96px; border-radius: 50%;
    background: var(--charcoal);
    border: 1px solid #2a2722;
    overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
    color: #807a6c;
    font-family: 'Archivo Black'; font-size: 34px; letter-spacing: -0.02em;
  }
  .acc-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .acc-head .eyebrow {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--pink); letter-spacing: 0.22em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .acc-head h1 {
    font-family: 'Archivo Black'; font-size: clamp(34px, 4.4vw, 56px);
    margin: 0; letter-spacing: -0.02em; line-height: 0.96;
  }
  .acc-head .meta {
    margin-top: 8px; color: #807a6c; font-family: 'Space Mono', monospace;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .acc-head .meta b { color: var(--white); font-weight: 700; }
  .acc-head-r { text-align: right; }
  .acc-head .uid {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: #6a6557; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .acc-head .uid b { color: var(--yellow); font-weight: 700; }

  /* button column */
  .acc-col { display: grid; gap: 14px; }
  .acc-row {
    display: grid; grid-template-columns: 56px 1fr auto;
    gap: 18px; align-items: center;
    width: 100%; padding: 22px 26px;
    background: var(--charcoal); border: 1px solid #2a2722;
    color: var(--white); cursor: pointer;
    font-family: inherit; text-align: left;
    transition: background .15s, border-color .15s, transform .15s;
  }
  .acc-row:hover { border-color: var(--yellow); transform: translateX(2px); }
  .acc-row.active { border-color: var(--yellow); background: #14130f; }
  .acc-row .icn {
    width: 56px; height: 56px; flex: none;
    display: flex; align-items: center; justify-content: center;
    background: var(--black); color: var(--yellow);
    border: 1px solid #2a2722;
  }
  .acc-row .body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .acc-row .body .title {
    font-family: 'Archivo Black'; font-size: 20px;
    letter-spacing: -0.01em; line-height: 1;
  }
  .acc-row .body .sub {
    color: #807a6c;
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .acc-row .chev {
    font-family: 'Space Mono', monospace; color: #4a463d;
    font-size: 18px; transition: transform .15s, color .15s;
  }
  .acc-row:hover .chev { color: var(--yellow); transform: translateX(4px); }

  .acc-row.logout { background: transparent; border-color: #3a3630; }
  .acc-row.logout .icn {
    background: transparent; color: #b5b0a2; border-color: #3a3630;
  }
  .acc-row.logout:hover { border-color: var(--pink); }
  .acc-row.logout:hover .icn { color: var(--pink); border-color: var(--pink); }
  .acc-row.logout:hover .chev { color: var(--pink); }
  .acc-row.logout .body .title { color: var(--pink); }

  .acc-row.admin-link { text-decoration: none; }
  .acc-row.admin-link .icn { background: var(--yellow); color: var(--black); border-color: var(--yellow); }
  .acc-row.admin-link:hover { border-color: var(--yellow); background: #14130f; }

  /* expandable panel beneath each row */
  .acc-panel {
    background: var(--black); border: 1px solid #2a2722; border-top: none;
    padding: 24px 26px 26px; margin-top: -14px; margin-bottom: 0;
    animation: panel-in .25s ease;
  }
  @keyframes panel-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .panel-head {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px dashed #2a2722; padding-bottom: 14px; margin-bottom: 18px;
  }
  .panel-head .lbl {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--yellow); letter-spacing: 0.22em; text-transform: uppercase;
  }
  .panel-head .right {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: #6a6557; letter-spacing: 0.16em; text-transform: uppercase;
  }

  /* Profile form */
  .pf-grid { display: grid; grid-template-columns: 200px 1fr; gap: 28px; align-items: start; }
  .pf-photo {
    position: relative; width: 200px; height: 200px; border-radius: 50%;
    border: 1px dashed #3a3630; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: var(--charcoal);
    color: #807a6c; font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase; text-align: center;
    cursor: pointer;
  }
  .pf-photo:hover { border-color: var(--yellow); color: var(--yellow); }
  .pf-photo img { width: 100%; height: 100%; object-fit: cover; }
  .pf-photo input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .pf-photo .hover-tag {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 999px;
    opacity: 0; transition: opacity .15s;
  }
  .pf-photo:hover .hover-tag { opacity: 1; }
  .pf-photo .crop-mask {
    position: absolute; inset: -2px; border-radius: 50%;
    box-shadow: inset 0 0 0 1px rgba(232,214,14,0.18);
    pointer-events: none;
  }

  .pf-fields { display: flex; flex-direction: column; gap: 14px; }
  .pf-fields label > span {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: #807a6c; letter-spacing: 0.14em; text-transform: uppercase;
    display: block; margin-bottom: 6px;
  }
  .pf-fields input {
    width: 100%; background: var(--black); border: 1px solid #3a3630;
    color: var(--white); padding: 12px 14px; font-size: 15px;
    font-family: inherit; border-radius: 4px; transition: border-color .15s;
  }
  .pf-fields input:focus { outline: none; border-color: var(--yellow); }
  .pf-actions { display: flex; gap: 10px; margin-top: 6px; align-items: center; }
  .pf-save {
    background: var(--yellow); color: var(--black); border: none;
    padding: 12px 22px; border-radius: 999px;
    font-family: 'Archivo Black'; font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    transition: background .15s;
  }
  .pf-save:hover { background: var(--white); }
  .pf-status {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--yellow); letter-spacing: 0.14em; text-transform: uppercase;
    opacity: 0; transition: opacity .2s;
  }
  .pf-status.show { opacity: 1; }
  .pf-rules {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: #6a6557; letter-spacing: 0.08em;
    margin-top: 4px; line-height: 1.4;
  }

  /* Downloads */
  .dl-grid { display: flex; flex-direction: column; gap: 14px; }
  .dl-card {
    background: var(--charcoal); border: 1px solid #2a2722;
    padding: 18px 20px;
  }
  .dl-card-head {
    display: grid; grid-template-columns: 1fr auto;
    gap: 18px; align-items: center;
    border-bottom: 1px dashed #2a2722; padding-bottom: 12px; margin-bottom: 14px;
  }
  .dl-card-head .name {
    font-family: 'Archivo Black'; font-size: 22px; letter-spacing: -0.01em;
  }
  .dl-card-head .name .ver {
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 400;
    color: #807a6c; letter-spacing: 0.16em; margin-left: 10px;
  }
  .dl-card-head .code {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Space Mono', monospace; font-size: 12px;
    color: #b5b0a2; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .dl-card-head .code b {
    color: var(--yellow); letter-spacing: 0.32em; font-weight: 700;
    border: 1px solid #3a3630; padding: 4px 10px; background: var(--black);
  }
  .dl-card-head .code .dl-code-btn {
    background: transparent; border: 1px solid #3a3630;
    color: #b5b0a2; padding: 4px 10px; cursor: pointer;
    font: inherit; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    transition: all .15s;
  }
  .dl-card-head .code .dl-code-btn:hover { border-color: var(--yellow); color: var(--yellow); }

  .dl-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .dl-btn {
    display: grid; grid-template-columns: 36px 1fr auto; gap: 12px; align-items: center;
    padding: 12px 14px; background: var(--black); border: 1px solid #2a2722;
    color: var(--white); font-family: inherit; cursor: pointer;
    transition: all .15s;
  }
  .dl-btn:hover { border-color: var(--yellow); color: var(--yellow); }
  .dl-btn .ic {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    background: #14130f; color: var(--yellow); border: 1px solid #2a2722;
  }
  .dl-btn .lbl {
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .dl-btn .lbl b { font-weight: 700; color: var(--white); letter-spacing: 0.06em; }
  .dl-btn:hover .lbl b { color: var(--yellow); }
  .dl-btn .arr { color: #4a463d; font-family: 'Space Mono', monospace; }
  .dl-btn:hover .arr { color: var(--yellow); }

  /* Subscription panel */
  .sub-state {
    display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: end;
  }
  .sub-state .plan {
    font-family: 'Archivo Black'; font-size: 38px; letter-spacing: -0.02em; line-height: 1;
  }
  .sub-state .plan .alt { color: var(--yellow); }
  .sub-state .lede {
    font-size: 14px; color: #b5b0a2; line-height: 1.55; margin: 8px 0 0;
    max-width: 540px; text-wrap: pretty;
  }
  .sub-state .next {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: #807a6c; letter-spacing: 0.14em; text-transform: uppercase;
    text-align: right;
  }
  .sub-state .next b { color: var(--white); font-weight: 700; }
  .sub-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .sub-act {
    padding: 12px 18px; border-radius: 999px;
    background: transparent; color: var(--white); border: 1px solid #3a3630;
    font: inherit; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    transition: all .15s;
  }
  .sub-act:hover { border-color: var(--yellow); color: var(--yellow); }
  .sub-act.danger:hover { border-color: var(--pink); color: var(--pink); }
  .sub-act.primary { background: var(--yellow); color: var(--black); border-color: var(--yellow); }
  .sub-act.primary:hover { background: var(--white); border-color: var(--white); color: var(--black); }

  /* Messages */
  .msg-list { display: flex; flex-direction: column; gap: 10px; }
  .msg-item {
    display: grid; grid-template-columns: 44px 1fr auto; gap: 14px; align-items: start;
    padding: 14px 16px; background: var(--charcoal); border: 1px solid #2a2722;
    transition: border-color .15s;
  }
  .msg-item:hover { border-color: var(--yellow); }
  .msg-item.unread { border-left: 3px solid var(--yellow); }
  .msg-item .who-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--black); border: 1px solid #2a2722;
    display: flex; align-items: center; justify-content: center;
    color: var(--yellow); font-family: 'Archivo Black'; font-size: 16px;
  }
  .msg-item .who-avatar.admin { background: var(--pink); color: var(--black); }
  .msg-item .who {
    font-family: 'Archivo Black'; font-size: 14px; letter-spacing: -0.01em;
  }
  .msg-item .who .badge {
    margin-left: 8px; font-family: 'Space Mono', monospace; font-size: 9px;
    font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    background: var(--pink); color: var(--black); padding: 2px 6px;
  }
  .msg-item .who .badge.user { background: var(--charcoal); color: #b5b0a2; border: 1px solid #2a2722; }
  .msg-item .body { color: #b5b0a2; font-size: 14px; line-height: 1.45; margin-top: 4px; text-wrap: pretty; }
  .msg-item .when {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: #6a6557; letter-spacing: 0.12em; text-transform: uppercase; text-align: right; white-space: nowrap;
  }

  .msg-compose {
    margin-top: 18px; border-top: 1px dashed #2a2722; padding-top: 18px;
    display: grid; grid-template-columns: 1fr auto; gap: 12px;
  }
  .msg-compose textarea {
    width: 100%; background: var(--black); border: 1px solid #3a3630;
    color: var(--white); padding: 12px 14px; font-family: inherit; font-size: 14px;
    border-radius: 6px; min-height: 56px; resize: vertical;
  }
  .msg-compose textarea:focus { outline: none; border-color: var(--yellow); }
  .msg-compose .send {
    background: var(--yellow); color: var(--black); border: none;
    padding: 0 22px; border-radius: 999px; cursor: pointer;
    font-family: 'Archivo Black'; font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase;
    transition: background .15s;
    align-self: stretch;
  }
  .msg-compose .send:hover { background: var(--white); }

  /* Toast for code copy etc */
  .acc-toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--black); color: var(--yellow);
    padding: 12px 18px; border-radius: 999px;
    font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 200;
    border: 1px solid #2a2722;
  }
  .acc-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* not-logged gate */
  .acc-gate {
    text-align: center; padding: 80px 24px;
    border: 1px dashed #2a2722; max-width: 560px; margin: 60px auto;
  }
  .acc-gate h2 {
    font-family: 'Archivo Black'; font-size: 36px; letter-spacing: -0.02em;
    margin: 0 0 12px;
  }
  .acc-gate p { color: #b5b0a2; font-size: 15px; margin: 0 0 24px; }
  .acc-gate button {
    background: var(--yellow); color: var(--black); border: none;
    padding: 14px 22px; border-radius: 999px;
    font-family: 'Archivo Black'; font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  }
  .acc-gate button:hover { background: var(--white); }

  @media (max-width: 800px) {
    .acc-head { grid-template-columns: 72px 1fr; }
    .acc-head-r { display: none; }
    .pf-grid { grid-template-columns: 1fr; }
    .dl-buttons { grid-template-columns: 1fr; }
    .acc-shell { padding: 32px 18px 80px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="account.jsx"></script>
</body>
</html>
